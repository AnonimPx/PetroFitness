<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1">
<title>NutriTrack Pro</title>
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NutriTrack">
<meta name="mobile-web-app-capable" content="yes">
<link id="pwa-manifest" rel="manifest">
<link id="apple-touch-icon" rel="apple-touch-icon" sizes="192x192">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{
  --ink:#1a1a2e;--ink2:#444;--ink3:#888;
  --paper:#f5f0e8;--card:#fffef9;
  --green:#16a34a;--greenl:#dcfce7;--greend:#14532d;
  --red:#dc2626;--amber:#d97706;--blu:#2563eb;--pur:#7c3aed;
  --r:6px;--rk:12px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
html,body{height:100%;overflow:hidden;background:#1a1a2e;font-family:'IBM Plex Sans',sans-serif;color:var(--ink);}
#app-wrap{position:fixed;top:0;left:0;right:0;bottom:0;max-width:430px;margin:0 auto;display:flex;flex-direction:column;background:var(--paper);padding-top:var(--safe-top);}
.hdr{background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;min-height:54px;flex-shrink:0;}
.hdr-left{display:flex;align-items:center;gap:10px}
.back-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.back-btn:active{background:rgba(255,255,255,.3)}
.hdr-titles{line-height:1.2}
.hdr-title{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;letter-spacing:1px}
.hdr-sub{font-size:9px;opacity:.5;font-family:'IBM Plex Mono',monospace;letter-spacing:.5px}
.hdr-avatar{width:32px;height:32px;border-radius:50%;background:var(--green);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0;}

/* ══ SCREEN — UNICA zona scrollabile, mai modificata da JS ══ */
.screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;background:var(--paper);padding-bottom:calc(var(--safe-bottom) + 80px);}
.screen::-webkit-scrollbar{width:3px}
.screen::-webkit-scrollbar-thumb{background:var(--ink3)}

.credits{background:var(--ink);color:rgba(255,255,255,.4);text-align:center;font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.3px;padding:4px 10px;flex-shrink:0;line-height:1.4;padding-bottom:calc(4px + var(--safe-bottom));}
.credits b{color:rgba(255,255,255,.7)}

/* LOGIN */
#login-scr{
  position:fixed;inset:0;z-index:999;
  background:#0d1117;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;overflow-y:auto;
  padding-top:calc(24px + var(--safe-top));
  padding-bottom:calc(24px + var(--safe-bottom));
}
/* sfondo animato bolle */
#login-scr::before{
  content:'';position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 30%, rgba(22,163,74,.18) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 70%, rgba(37,99,235,.15) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 60% 10%, rgba(124,58,237,.12) 0%, transparent 70%);
  pointer-events:none;
}
.l-wrap{position:relative;z-index:1;width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;}
/* logo pulsante */
.l-logo-ring{
  width:90px;height:90px;border-radius:50%;
  background:conic-gradient(from 0deg, #16a34a, #22c55e, #86efac, #16a34a);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;
  box-shadow:0 0 40px rgba(22,163,74,.4), 0 0 80px rgba(22,163,74,.15);
  animation:l-spin 6s linear infinite;
  position:relative;
}
.l-logo-ring::before{
  content:'';position:absolute;inset:3px;border-radius:50%;
  background:#0d1117;
}
.l-logo-inner{
  position:relative;z-index:1;
  width:76px;height:76px;border-radius:50%;
  background:linear-gradient(135deg,#14532d,#166534);
  display:flex;align-items:center;justify-content:center;
  font-size:38px;
}
@keyframes l-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.l-title{
  font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:700;
  color:#f0fdf4;letter-spacing:4px;margin-bottom:4px;text-align:center;
}
.l-tagline{
  font-family:'IBM Plex Mono',monospace;font-size:10px;color:#4ade80;
  letter-spacing:3px;text-transform:uppercase;margin-bottom:36px;text-align:center;
  opacity:.8;
}
/* profili esistenti */
.l-profiles{width:100%;margin-bottom:20px;}
.l-profiles-title{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;letter-spacing:2px;color:#4b5563;text-transform:uppercase;margin-bottom:10px;text-align:center;}
.l-profiles-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.l-profile-btn{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:12px 14px;border:1.5px solid rgba(255,255,255,.1);
  border-radius:14px;background:rgba(255,255,255,.04);
  cursor:pointer;transition:all .2s;min-width:72px;
}
.l-profile-btn:active{border-color:#22c55e;background:rgba(22,163,74,.1);transform:scale(.95);}
.l-profile-avatar{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:#fff;
  background:linear-gradient(135deg,#16a34a,#15803d);
  box-shadow:0 2px 10px rgba(22,163,74,.3);
}
.l-profile-name{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;color:#9ca3af;letter-spacing:.5px;text-transform:uppercase;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* divider */
.l-or{display:flex;align-items:center;gap:12px;width:100%;margin-bottom:20px;}
.l-or span{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#374151;letter-spacing:2px;white-space:nowrap;text-transform:uppercase;}
.l-or::before,.l-or::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);}
/* nuovo profilo card */
.l-new-card{
  width:100%;background:rgba(255,255,255,.04);
  border:1.5px solid rgba(255,255,255,.1);border-radius:18px;
  padding:20px;
}
.l-new-title{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:#6b7280;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;}
.l-name-wrap{position:relative;margin-bottom:14px;}
.l-name-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;}
.l-name-inp{
  width:100%;padding:15px 15px 15px 46px;
  background:rgba(255,255,255,.07);
  border:2px solid rgba(255,255,255,.1);
  border-radius:12px;font-size:17px;color:#f0fdf4;
  font-family:'IBM Plex Mono',monospace;outline:none;
  transition:border-color .2s,background .2s;
}
.l-name-inp::placeholder{color:rgba(255,255,255,.2);font-size:14px;}
.l-name-inp:focus{border-color:#22c55e;background:rgba(22,163,74,.06);}
.l-start-btn{
  width:100%;padding:15px;
  background:linear-gradient(135deg,#16a34a 0%,#15803d 100%);
  border:none;border-radius:12px;
  font-size:14px;font-weight:700;color:#f0fdf4;
  cursor:pointer;font-family:'IBM Plex Mono',monospace;
  letter-spacing:1.5px;text-transform:uppercase;
  box-shadow:0 4px 20px rgba(22,163,74,.35);
  transition:all .2s;
}
.l-start-btn:active{transform:scale(.97);box-shadow:0 2px 10px rgba(22,163,74,.2);}
.l-err{color:#fca5a5;font-size:11px;text-align:center;min-height:16px;margin-bottom:8px;font-family:'IBM Plex Mono',monospace;}

/* HOME */
.day-strip{background:var(--ink);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
.ds-kcal{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700}
.ds-label{font-size:9px;opacity:.5;letter-spacing:.5px;font-family:'IBM Plex Mono',monospace}
.ds-macros{display:flex;gap:12px}
.ds-mac{text-align:center}
.ds-mv{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700}
.ds-ml{font-size:9px;opacity:.5;font-family:'IBM Plex Mono',monospace;letter-spacing:.3px}
.nk-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}
.nk-btn{background:var(--card);border:1.5px solid rgba(0,0,0,.08);border-radius:var(--rk);padding:16px 10px 14px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:transform .1s;user-select:none;min-height:116px;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.09);}
.nk-btn:active{transform:scale(.95)}
.nk-ico-wrap{width:58px;height:58px;border-radius:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.2)}
.nk-ico-wrap svg{width:28px;height:28px}
.nk-lbl{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.5px;text-align:center;text-transform:uppercase;color:var(--ink)}
.ico-diario .nk-ico-wrap{background:linear-gradient(135deg,#f59e0b,#d97706)}
.ico-alimenti .nk-ico-wrap{background:linear-gradient(135deg,#22c55e,#16a34a)}
.ico-piano .nk-ico-wrap{background:linear-gradient(135deg,#60a5fa,#2563eb)}
.ico-workout .nk-ico-wrap{background:linear-gradient(135deg,#f87171,#dc2626)}
.ico-profilo .nk-ico-wrap{background:linear-gradient(135deg,#c084fc,#7c3aed)}
.ico-setting .nk-ico-wrap{background:linear-gradient(135deg,#94a3b8,#1a1a2e)}

/* MEAL */
.meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}
.meal-btn{border-radius:var(--rk);padding:16px 10px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:transform .1s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.meal-btn:active{transform:scale(.95)}
.meal-btn.col{background:linear-gradient(160deg,#fff8e7,#fef3c7);border:1.5px solid #f59e0b}
.meal-btn.pran{background:linear-gradient(160deg,#f0fdf4,#dcfce7);border:1.5px solid #22c55e}
.meal-btn.cena{background:linear-gradient(160deg,#eff6ff,#dbeafe);border:1.5px solid #3b82f6}
.meal-btn.mer{background:linear-gradient(160deg,#fff1f2,#ffe4e6);border:1.5px solid #ef4444}
.meal-ico{font-size:36px;line-height:1}
.meal-lbl{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--ink)}
.meal-kk{font-size:14px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.meal-n{font-size:10px;color:var(--ink3);font-family:'IBM Plex Mono',monospace}

/* FOOD LIST — sticky header, nessun flex su #screen */
.srch-bar{position:sticky;top:0;z-index:10;background:var(--card);border-bottom:2px solid var(--ink);padding:10px 12px;}
.srch-inp{width:100%;padding:10px 14px;border:2px solid var(--ink);border-radius:var(--r);font-size:14px;font-family:'IBM Plex Sans',sans-serif;background:var(--paper);outline:none;color:var(--ink)}
.srch-inp:focus{border-color:var(--green)}
.cats-bar{position:sticky;top:55px;z-index:9;display:flex;gap:6px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid #e8e3d8;background:var(--card);}
.cats-bar::-webkit-scrollbar{display:none}
.cat-pill{white-space:nowrap;padding:5px 11px;border-radius:20px;font-size:10px;font-weight:700;border:1.5px solid var(--ink);background:var(--paper);color:var(--ink);cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:.3px;transition:all .15s;flex-shrink:0}
.cat-pill.on{background:var(--ink);color:#fff}
.food-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid #ede8dc;cursor:pointer;background:var(--card);gap:10px;}
.food-row:active{background:var(--greenl)}
.food-emo{font-size:22px;width:28px;text-align:center;flex-shrink:0}
.food-inf{flex:1;min-width:0}
.food-nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.food-ct{font-size:10px;color:var(--ink3);font-family:'IBM Plex Mono',monospace;margin-top:1px}
.food-kk{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;color:var(--green);flex-shrink:0;text-align:right}
.food-kk-u{font-size:9px;font-weight:400;color:var(--ink3);display:block}

/* LOG */
.log-item{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #ede8dc;background:var(--card);gap:9px}
.log-emo{font-size:20px;flex-shrink:0}
.log-inf{flex:1;min-width:0}
.log-nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-dt{font-size:10px;color:var(--ink3);font-family:'IBM Plex Mono',monospace;margin-top:1px}
.log-kk{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:var(--green);flex-shrink:0}
.log-del{width:28px;height:28px;border-radius:50%;border:2px solid var(--red);background:none;color:var(--red);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700}
.add-btn-row{padding:10px 12px;background:var(--paper);border-top:1px solid #ede8dc}
.add-btn{width:100%;padding:12px;border:2px dashed var(--ink3);border-radius:var(--r);background:none;font-size:12px;font-weight:700;color:var(--ink3);cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:.5px;text-transform:uppercase;}
.add-btn:active{border-color:var(--green);color:var(--green);background:var(--greenl)}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(15,15,26,.75);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-ov.open{display:flex}
.modal-box{background:var(--card);border:2px solid var(--ink);border-radius:18px 18px 0 0;padding:18px 18px calc(18px + var(--safe-bottom));width:100%;max-width:430px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.modal-handle{width:36px;height:4px;background:#ccc;border-radius:2px;margin:0 auto 16px}
.modal-title{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;margin-bottom:3px}
.modal-sub{font-size:11px;color:var(--ink3);margin-bottom:14px;font-family:'IBM Plex Mono',monospace}
.nut-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.nut-cell{border-radius:var(--r);padding:10px;text-align:center;border:1.5px solid #e8e3d8}
.nut-val{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700}
.nut-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);margin-top:2px;font-family:'IBM Plex Mono',monospace}
.nut-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px}
.nut-tbl tr{border-bottom:1px solid #ede8dc}
.nut-tbl tr:last-child{border:none}
.nut-tbl td{padding:6px 4px;font-family:'IBM Plex Mono',monospace}
.nut-tbl td:last-child{text-align:right;font-weight:700}
.nut-sub{color:var(--ink3);padding-left:14px!important;font-size:10px}
.gram-row{display:flex;gap:8px;align-items:stretch}
.gram-inp{flex:1;padding:12px;border:2px solid var(--ink);border-radius:var(--r);font-size:18px;font-family:'IBM Plex Mono',monospace;outline:none;color:var(--ink);background:var(--paper);text-align:center}
.gram-inp:focus{border-color:var(--green)}
.meal-sel{flex:1;padding:12px 10px;border:2px solid var(--ink);border-radius:var(--r);font-size:12px;font-family:'IBM Plex Mono',monospace;outline:none;color:var(--ink);background:var(--paper)}
.prev-box{font-size:11px;color:var(--ink3);margin-top:8px;padding:8px 10px;background:var(--greenl);border:1px solid #86efac;border-radius:var(--r);font-family:'IBM Plex Mono',monospace;line-height:1.7}
.conf-btn{width:100%;padding:14px;background:var(--ink);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;text-transform:uppercase;margin-top:12px}
.conf-btn:active{background:var(--green)}
.conf-btn.green-btn{background:var(--green)}
.card{background:var(--card);border:1.5px solid #e8e3d8;border-radius:var(--rk);margin:10px 12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-hdr{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:9px 12px;border-bottom:1.5px solid #e8e3d8;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:12px}
.form-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #ede8dc}
.form-lbl{font-size:11px;font-weight:700;min-width:70px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.3px;color:var(--ink2);flex-shrink:0}
.form-inp{flex:1;padding:8px 10px;border:1.5px solid #ccc;border-radius:var(--r);font-size:14px;font-family:'IBM Plex Mono',monospace;outline:none;background:var(--paper);color:var(--ink)}
.form-inp:focus{border-color:var(--green)}
.form-sel{flex:1;padding:8px 10px;border:1.5px solid #ccc;border-radius:var(--r);font-size:12px;font-family:'IBM Plex Mono',monospace;outline:none;background:var(--paper);color:var(--ink)}
.big-btn{display:block;width:calc(100% - 24px);margin:10px 12px;padding:13px;background:var(--ink);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:700;cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:1px;text-transform:uppercase;text-align:center}
.big-btn:active{background:var(--green)}
.big-btn.outline{background:none;color:var(--ink);border:2px solid var(--ink)}
.big-btn.outline:active{background:var(--greenl)}
.big-btn.danger{background:var(--red)}
.big-btn.success{background:var(--green)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 12px}
.stat-cell{border:1.5px solid #e8e3d8;border-radius:var(--r);padding:10px 8px;text-align:center;background:var(--card)}
.stat-val{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:700}
.stat-unit{font-size:10px;color:var(--ink3);margin-top:1px}
.stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);margin-top:3px;font-family:'IBM Plex Mono',monospace}
.week-strip{display:flex;gap:5px;padding:10px 12px;overflow-x:auto;scrollbar-width:none;border-bottom:2px solid var(--ink);background:var(--card);position:sticky;top:0;z-index:8;}
.week-strip::-webkit-scrollbar{display:none}
.wday{min-width:42px;padding:7px 4px;border:1.5px solid #ccc;border-radius:var(--r);text-align:center;cursor:pointer;background:var(--paper);transition:all .15s;flex-shrink:0}
.wday.today{border-color:var(--green);background:var(--greenl)}
.wday.sel{background:var(--ink);border-color:var(--ink);color:#fff}
.wday.has .wdd::after{content:"·";color:var(--green);display:block;font-size:16px;line-height:.4;margin-top:3px}
.wday.sel.has .wdd::after{color:#86efac}
.wdn{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.3px}
.wdd{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700}
.pmeal-hdr{padding:9px 14px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.pmeal-ttl{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.pmeal-kk{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:#86efac}
.wo-card{margin:0 12px 8px;border:1.5px solid #e8e3d8;border-radius:var(--rk);overflow:hidden}
.wo-card-hdr{background:var(--ink);color:#fff;padding:9px 12px;display:flex;align-items:center;justify-content:space-between}
.wo-card-nm{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700}
.wo-card-tp{font-size:9px;opacity:.7;font-family:'IBM Plex Mono',monospace;letter-spacing:.5px}
.wo-card-body{padding:10px 12px;background:var(--card);display:flex;flex-wrap:wrap;gap:6px}

.hist-vals{flex:1;font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.7}
.hist-del{width:24px;height:24px;border-radius:50%;border:2px solid var(--red);background:none;color:var(--red);cursor:pointer;font-size:11px;font-weight:700;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.bar-wrap{height:6px;background:#e8e3d8;border-radius:3px;overflow:hidden;margin-top:3px}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
.empty{padding:44px 16px;text-align:center;color:var(--ink3)}
.empty-ico{font-size:48px;margin-bottom:10px}
.empty-txt{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.5px;line-height:1.7}
textarea{width:100%;min-height:68px;border:1.5px solid #ccc;border-radius:var(--r);padding:9px 11px;font-size:12px;font-family:'IBM Plex Mono',monospace;resize:vertical;outline:none;background:var(--paper);color:var(--ink);display:block}
textarea:focus{border-color:var(--green)}
.tdee-res{border:2px solid var(--green);border-radius:var(--r);padding:12px;margin:8px 12px;background:var(--greenl);font-family:'IBM Plex Mono',monospace;font-size:12px;line-height:2;display:none}
.water-cups{display:flex;gap:6px;flex-wrap:wrap}
.w-cup{width:36px;height:36px;border:2px solid #ccc;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--paper);transition:all .15s}
.w-cup.filled{background:#dbeafe;border-color:#3b82f6}
.w-cup:active{transform:scale(.9)}
.home-pill{display:flex;justify-content:center;padding:20px 12px 10px;}
.home-pill button{background:var(--ink);color:#fff;border:none;border-radius:99px;padding:10px 32px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.8px;cursor:pointer;box-shadow:0 4px 14px rgba(26,26,46,.4);}
.home-pill button:active{transform:scale(.96);}
.install-step{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid #ede8dc}
.install-step:last-child{border:none}
.install-num{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.install-text{flex:1;font-size:13px;line-height:1.5;color:var(--ink)}
.install-text b{font-weight:700;color:var(--ink)}
.install-text small{display:block;font-size:11px;color:var(--ink3);margin-top:2px;font-family:'IBM Plex Mono',monospace}
.os-tabs{display:flex;gap:6px;margin-bottom:14px}
.os-tab{flex:1;padding:10px;border:2px solid var(--ink);border-radius:var(--r);text-align:center;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;transition:all .15s}
.os-tab.on{background:var(--ink);color:#fff}
.chart-tabs{display:flex;gap:5px;padding:10px 12px 4px;flex-wrap:wrap}
.chart-tab{padding:5px 11px;border-radius:20px;font-size:10px;font-weight:700;border:1.5px solid var(--ink);background:var(--paper);color:var(--ink);cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:.3px;}
.chart-tab.on{background:var(--ink);color:#fff}
.chart-wrap{padding:12px;background:var(--card);}
.chart-c{width:100%!important;display:block;}
/* ── MACRO RING (grafico torta CSS) ── */
.macro-ring-wrap{display:flex;align-items:center;gap:16px;padding:12px}
.macro-ring{position:relative;width:80px;height:80px;flex-shrink:0}
.macro-ring svg{width:80px;height:80px;transform:rotate(-90deg)}
.macro-ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace}
.macro-ring-pct{font-size:16px;font-weight:700;color:var(--ink)}
.macro-ring-sub{font-size:8px;color:var(--ink3);letter-spacing:.3px}
.macro-legend{display:flex;flex-direction:column;gap:5px;flex:1}
.macro-leg-row{display:flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:10px}
.macro-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.macro-leg-val{margin-left:auto;font-weight:700}
/* ── STREAK ── */
.streak-banner{background:linear-gradient(135deg,#d97706,#f59e0b);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;margin:8px 12px;border-radius:var(--rk)}
.streak-fire{font-size:32px}
.streak-txt{font-family:'IBM Plex Mono',monospace}
.streak-n{font-size:22px;font-weight:700}
.streak-lbl{font-size:9px;opacity:.8;letter-spacing:.5px;text-transform:uppercase}
/* ── ALIMENTO CUSTOM ── */
.custom-badge{background:#ede9fe;border:1px solid #7c3aed;color:#6d28d9;font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.3px}
/* ── RICETTE ── */
.recipe-card{margin:0 12px 8px;border:1.5px solid #e8e3d8;border-radius:var(--rk);overflow:hidden}
.recipe-hdr{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.recipe-nm{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700}
.recipe-body{padding:10px 14px;background:var(--card);display:flex;gap:10px;align-items:center}
.recipe-macros{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink3);flex:1}
/* ── DIARIO STORICO ── */
.hist-day-card{margin:0 12px 8px;border:1.5px solid #e8e3d8;border-radius:var(--rk);overflow:hidden;cursor:pointer}
.hist-day-hdr{padding:10px 14px;background:var(--card);display:flex;align-items:center;justify-content:space-between}
.hist-day-date{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700}
.hist-day-kcal{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700}
/* ── PROIEZIONE PESO ── */
.proj-card{background:linear-gradient(135deg,var(--greenl),#d1fae5);border:1.5px solid #86efac;border-radius:var(--rk);margin:0 12px 8px;padding:14px}
.proj-title{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--greend);margin-bottom:8px}
.proj-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;font-family:'IBM Plex Mono',monospace;font-size:12px}
.proj-val{font-weight:700;color:var(--greend)}
/* ── REPORT MENSILE ── */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:12px}
.month-cell{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;cursor:pointer}
.month-cell.empty{background:transparent}
.month-cell.ok{background:#dcfce7;color:var(--greend)}
.month-cell.over{background:#fee2e2;color:#991b1b}
.month-cell.nodata{background:#f3f4f6;color:#9ca3af}
.month-cell.today{outline:2px solid var(--green)}
/* ── NOTE GIORNALIERE ── */
.daily-note{background:#fffbeb;border:1.5px solid #fde68a;border-radius:var(--r);padding:10px 12px;margin:8px 12px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#92400e}
/* ── OBIETTIVO PESO ── */
.goal-progress{height:10px;background:#e8e3d8;border-radius:5px;overflow:hidden;margin:6px 0}
.goal-progress-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#16a34a,#22c55e);transition:width .5s}

let _audioCtx=null;
function getAudioCtx(){if(!_audioCtx){try{_audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}return _audioCtx;}
function snd(type='click'){
  try{
    const ctx=getAudioCtx();if(!ctx)return;
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    const now=ctx.currentTime;
    if(type==='confirm'){osc.frequency.setValueAtTime(520,now);osc.frequency.setValueAtTime(780,now+0.07);gain.gain.setValueAtTime(0.08,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.18);osc.start(now);osc.stop(now+0.18);}
    else if(type==='delete'){osc.frequency.setValueAtTime(400,now);osc.frequency.exponentialRampToValueAtTime(200,now+0.12);gain.gain.setValueAtTime(0.07,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.12);osc.start(now);osc.stop(now+0.12);}
    else{osc.type='sine';osc.frequency.setValueAtTime(600,now);osc.frequency.exponentialRampToValueAtTime(300,now+0.08);gain.gain.setValueAtTime(0.06,now);gain.gain.exponentialRampToValueAtTime(0.001,now+0.08);osc.start(now);osc.stop(now+0.08);}
  }catch(e){}
}

/* ════════ AUTH — solo nome, nessuna password ════════ */
let CUR=null;
const PKEY='nt_profiles_v10'; // {slug: {name, slug}}
const CKEY='nt_cur_v10';      // slug corrente

function getProfiles(){try{return JSON.parse(localStorage.getItem(PKEY)||'{}')}catch{return{}}}
function saveProfiles(p){try{localStorage.setItem(PKEY,JSON.stringify(p))}catch{}}
function slugify(name){return name.trim().toLowerCase().replace(/[^a-z0-9]/gi,'_').replace(/_+/g,'_').slice(0,30);}
function stateKey(slug){return'nt_state_v10_'+slug;}

function renderLoginProfiles(){
  const profiles=getProfiles();
  const keys=Object.keys(profiles);
  const wrap=document.getElementById('l-profiles');
  const grid=document.getElementById('l-profiles-grid');
  const or=document.getElementById('l-or');
  if(keys.length===0){wrap.style.display='none';or.style.display='none';return;}
  wrap.style.display='block';or.style.display='flex';
  grid.innerHTML=keys.map(k=>{
    const p=profiles[k];
    const initials=p.name.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    return `<div class="l-profile-btn" onclick="loginBySlug('${k}')">
      <div class="l-profile-avatar">${initials}</div>
      <div class="l-profile-name">${p.name.split(' ')[0]}</div>
    </div>`;
  }).join('');
}

function loginBySlug(slug){
  const profiles=getProfiles();
  const p=profiles[slug];
  if(!p)return;
  loginOk(slug,p.name);
}

function doLogin(){
  const name=(document.getElementById('l-name').value||'').trim();
  const err=document.getElementById('l-err');
  if(!name||name.length<2){err.textContent='⚠ Inserisci almeno 2 caratteri';return;}
  if(name.length>40){err.textContent='⚠ Nome troppo lungo';return;}
  err.textContent='';
  const slug=slugify(name);
  const profiles=getProfiles();
  // crea profilo se non esiste
  if(!profiles[slug]){profiles[slug]={name,slug};saveProfiles(profiles);}
  loginOk(slug,profiles[slug].name);
}

function loginOk(slug,name){
  CUR={slug,name};
  try{localStorage.setItem(CKEY,JSON.stringify(CUR));}catch(e){console.error('[NT] Cannot save session:',e);}
  const loginScr=document.getElementById('login-scr');
  const appWrap=document.getElementById('app-wrap');
  const avatar=document.getElementById('hdr-avatar');
  if(!loginScr||!appWrap||!avatar){
    // DOM non ancora pronto, riprova tra 50ms
    setTimeout(()=>loginOk(slug,name),50);
    return;
  }
  loginScr.style.display='none';
  appWrap.style.display='flex';
  avatar.textContent=name.trim()[0].toUpperCase();
  loadState();
  navInit();
}

// Auto-login: aspetta che il DOM sia pronto
function initApp(){
  // Mostra profili salvati
  try{renderLoginProfiles();}catch(e){}
  // Auto-login se sessione salvata
  try{
    const c=JSON.parse(localStorage.getItem(CKEY)||'null');
    if(c&&c.slug){
      const profiles=getProfiles();
      if(profiles[c.slug]){
        loginOk(c.slug,profiles[c.slug].name);
        return;
      } else {
        localStorage.removeItem(CKEY);
      }
    }
  }catch(e){console.warn('[NT] Auto-login error:',e);}
}
// Esegui quando il DOM è completamente caricato
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', initApp);
} else {
  initApp();
}

/* ════════ STATE ════════ */
const TODAY=new Date().toISOString().slice(0,10);
const MK=['colazione','pranzo','cena','merenda'];
const MM={colazione:{label:'Colazione',ico:'☕',cls:'col',color:'#d97706'},pranzo:{label:'Pranzo',ico:'🍽',cls:'pran',color:'#16a34a'},cena:{label:'Cena',ico:'🌙',cls:'cena',color:'#2563eb'},merenda:{label:'Merenda',ico:'🍎',cls:'mer',color:'#dc2626'}};
let S={meals:{colazione:[],pranzo:[],cena:[],merenda:[]},water:0,lastMealDate:TODAY,calPlans:{},workouts:{},mealHistory:{},recentFoods:[],customFoods:[],recipes:[],profile:{entries:[],nome:'',eta:'',sesso:'m',altezza:'',obiettivo:'mantenimento',attivita:'moderata'},settings:{kcal:2000,protPct:25}};

function saveState(){
  if(!CUR)return;
  if(!S.mealHistory)S.mealHistory={};
  const hasPasti=MK.some(k=>(S.meals[k]||[]).length>0);
  if(hasPasti){S.mealHistory[TODAY]=JSON.parse(JSON.stringify(S.meals));S.lastMealDate=TODAY;}
  try{
    const payload=JSON.stringify(S);
    localStorage.setItem(stateKey(CUR.slug),payload);
  }catch(e){
    console.error('[NT] saveState error:',e);
    // localStorage pieno? Pruning dati vecchi
    try{
      const cutoff=new Date();cutoff.setDate(cutoff.getDate()-60);
      const cutStr=cutoff.toISOString().slice(0,10);
      if(S.mealHistory)Object.keys(S.mealHistory).forEach(k=>{if(k<cutStr)delete S.mealHistory[k];});
      if(S.workouts)Object.keys(S.workouts).forEach(k=>{if(k<cutStr)delete S.workouts[k];});
      localStorage.setItem(stateKey(CUR.slug),JSON.stringify(S));
    }catch(e2){console.error('[NT] saveState fallback failed:',e2);}
  }
}
function loadState(){
  try{
    // Prova prima localStorage (stabile su HTTPS/GitHub Pages)
    let raw=localStorage.getItem(stateKey(CUR.slug));
    // Fallback: sessionStorage
    if(!raw)raw=sessionStorage.getItem(stateKey(CUR.slug));
    if(!raw)return;
    const p=JSON.parse(raw);
    // Se i pasti sono di un giorno precedente, archiviali e azzera
    if(p.meals){
      const hasPastiOggi=Object.values(p.meals||{}).some(arr=>arr&&arr.length>0);
      const lastDay=p.lastMealDate||TODAY;
      if(lastDay!==TODAY&&hasPastiOggi){
        // Archivia i pasti del giorno precedente
        if(!p.mealHistory)p.mealHistory={};
        p.mealHistory[lastDay]=JSON.parse(JSON.stringify(p.meals));
        S.meals={colazione:[],pranzo:[],cena:[],merenda:[]};
      } else {
        S.meals=Object.assign({colazione:[],pranzo:[],cena:[],merenda:[]},p.meals);
      }
    }
    if(typeof p.water==='number')S.water=p.water;
    if(p.calPlans)S.calPlans=p.calPlans;
    if(p.workouts)S.workouts=p.workouts;
    if(p.profile)S.profile=Object.assign({entries:[],nome:'',eta:'',sesso:'m',altezza:'',obiettivo:'mantenimento',attivita:'moderata'},p.profile);
    if(p.settings)S.settings=Object.assign({kcal:2000,protPct:25},p.settings);
    if(p.mealHistory)S.mealHistory=p.mealHistory;
    if(p.recentFoods)S.recentFoods=p.recentFoods;
    if(p.lastMealDate)S.lastMealDate=p.lastMealDate;
    if(p.customFoods)S.customFoods=p.customFoods;
    if(p.recipes)S.recipes=p.recipes;
    if(p.settings?.pesoTarget)S.settings.pesoTarget=p.settings.pesoTarget;
  }catch(e){console.warn('[NT] loadState error',e);}
}

function finishOnboarding(){
  const peso=parseFloat(document.getElementById('ob-peso').value);
  const h=parseFloat(document.getElementById('ob-h').value);
  const eta=parseFloat(document.getElementById('ob-eta').value);
  const err=document.getElementById('ob-err');
  if(!peso||!h||!eta){err.textContent='⚠ Inserisci peso, altezza ed età';return;}
  if(peso<30||peso>300){err.textContent='⚠ Peso non valido';return;}
  if(h<100||h>250){err.textContent='⚠ Altezza non valida';return;}
  if(eta<10||eta>120){err.textContent='⚠ Età non valida';return;}
  // Salva profilo
  S.profile.altezza=h;S.profile.eta=eta;S.profile.sesso=_obSesso;
  S.profile.obiettivo=_obObiettivo;S.profile.attivita=_obAttivita;
  S.profile.nome=CUR.name;
  // Prima misurazione
  if(!S.profile.entries.some(e=>e.date===TODAY)){
    S.profile.entries.push({date:TODAY,peso,vita:'',fianchi:'',grasso:'',note:'Inserimento iniziale'});
    S.profile.entries.sort((a,b)=>a.date.localeCompare(b.date));
  }
  // Calcola TDEE e imposta obiettivo
  const fAtt={sedentario:1.2,leggera:1.375,moderata:1.55,intensa:1.725,estrema:1.9};
  const bmr=_obSesso==='m'?10*peso+6.25*h-5*eta+5:10*peso+6.25*h-5*eta-161;
  const tdee=Math.round(bmr*(fAtt[_obAttivita]||1.55));
  S.settings.kcal=_obObiettivo==='dimagrimento'?tdee-500:_obObiettivo==='massa'?tdee+300:tdee;
  saveState();
  showOnboardingResult(peso,h,eta,tdee,S.settings.kcal);
}

/* ════════ FEEDBACK GIORNALIERO ════════ */
function getDailyFeedback(tot,burned,kcalObj,protTarget){
  const net=tot.e-burned;
  const deficit=kcalObj-net;
  const msgs=[];
  // Kcal
  if(tot.e===0)msgs.push({ico:'📝',col:'#888',txt:'Nessun alimento inserito oggi. Comincia a registrare i pasti!'});
  else if(deficit>200)msgs.push({ico:'✅',col:'var(--green)',txt:`Ottimo! Sei in deficit di ${deficit} kcal. Stai seguendo il piano.`});
  else if(deficit>0)msgs.push({ico:'👍',col:'var(--green)',txt:`Bene! Appena sotto l'obiettivo. Deficit di ${deficit} kcal.`});
  else if(-deficit<200)msgs.push({ico:'⚠️',col:'#d97706',txt:`Sei appena sopra l'obiettivo di ${Math.abs(deficit)} kcal. Attenzione alla cena.`});
  else msgs.push({ico:'🔴',col:'var(--red)',txt:`Hai superato l'obiettivo di ${Math.abs(deficit)} kcal. Aumenta l'attività fisica.`});
  // Proteine
  if(tot.e>0&&tot.p<protTarget*0.7)msgs.push({ico:'🥩',col:'#d97706',txt:`Proteine basse (${tot.p}g su ${protTarget}g). Aggiungi carne, uova o legumi.`});
  // Acqua
  if(S.water<6&&tot.e>0)msgs.push({ico:'💧',col:'#2563eb',txt:`Solo ${S.water} bicchieri d'acqua. Cerca di berne almeno 6-8 al giorno.`});
  return msgs;
}

/* ════════ MACRO RING — grafico torta CSS ════════ */
function macroRing(e,p,c,f){
  const tot=p+c+f||1;
  const pp=p/tot,pc=c/tot,pf=f/tot;
  const pct=Math.min(100,Math.round(e/S.settings.kcal*100));
  // SVG donut 3 archi
  function arc(pct,offset,col){
    const r=34,circ=2*Math.PI*r;
    const dash=circ*pct,gap=circ*(1-pct);
    return `<circle cx="40" cy="40" r="${r}" fill="none" stroke="${col}" stroke-width="10" stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}" stroke-dashoffset="${(-circ*offset).toFixed(1)}" stroke-linecap="round"/>`;
  }
  const svg=`<svg viewBox="0 0 80 80">${arc(pp,0,'#16a34a')}${arc(pc,pp,'#d97706')}${arc(pf,pp+pc,'#dc2626')}</svg>`;
  return `<div class="macro-ring-wrap">
    <div class="macro-ring">${svg}<div class="macro-ring-label"><div class="macro-ring-pct">${pct}%</div><div class="macro-ring-sub">OBJ</div></div></div>
    <div class="macro-legend">
      <div class="macro-leg-row"><div class="macro-leg-dot" style="background:#16a34a"></div>Proteine<span class="macro-leg-val">${p}g</span></div>
      <div class="macro-leg-row"><div class="macro-leg-dot" style="background:#d97706"></div>Carboidrati<span class="macro-leg-val">${c}g</span></div>
      <div class="macro-leg-row"><div class="macro-leg-dot" style="background:#dc2626"></div>Grassi<span class="macro-leg-val">${f}g</span></div>
    </div>
  </div>`;
}

/* ════════ STREAK ════════ */
function calcStreak(){
  let streak=0;
  const d=new Date();
  for(let i=0;i<365;i++){
    const ds=d.toISOString().slice(0,10);
    const src=ds===TODAY?S.meals:S.mealHistory?.[ds];
    const hasData=src&&MK.some(k=>(src[k]||[]).length>0);
    if(hasData){streak++;}else if(i>0){break;}
    d.setDate(d.getDate()-1);
  }
  return streak;
}

    const isToday=ds===TODAY;
    const isFuture=ds>TODAY;
    let cls='nodata';let e=0;
    if(hasDati){
      MK.forEach(k=>(src[k]||[]).forEach(it=>{e+=it.food.e*it.g/100;}));

      const net=Math.round(e)-burned;
      cls=net<=S.settings.kcal?'ok':'over';
      totE+=net;giorniDati++;if(cls==='ok')giorniOk++;
    }
    if(isFuture)cls='empty';
    html+=`<div class="month-cell ${cls}${isToday?' today':''}" title="${ds}">${d}</div>`;
  }

  // Statistiche mese

  html+=`<div class="card"><div class="card-hdr">📊 STATISTICHE ${mName.toUpperCase()}</div><div class="card-body">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">

      <div class="stat-cell"><div class="stat-val" style="font-size:18px;color:#2563eb">${mediaE}</div><div class="stat-lbl">MEDIA kcal</div></div>
    </div>
    <div style="margin-top:10px;display:flex;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:10px">
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:3px;background:#dcfce7;border:1px solid #86efac;display:inline-block"></span>In deficit</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:3px;background:#fee2e2;border:1px solid #fca5a5;display:inline-block"></span>Surplus</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:3px;background:#f3f4f6;border:1px solid #d1d5db;display:inline-block"></span>No dati</span>
    </div>
  </div></div>`;
  // Proiezione peso
  const lastPeso=S.profile.entries?.slice(-1)[0]?.peso;
  if(lastPeso&&S.profile.obiettivo==='dimagrimento'&&giorniDati>=3){
    const avgDeficit=S.settings.kcal-mediaE;
    const kgWeek=(avgDeficit*7)/7700;
    const pesoObiettivo=S.settings.pesoTarget;
    if(pesoObiettivo&&pesoObiettivo<lastPeso){
      const kgDa=lastPeso-pesoObiettivo;
      const settimane=kgDa/kgWeek;
      const dataTarget=new Date();dataTarget.setDate(dataTarget.getDate()+settimane*7);
      html+=`<div class="proj-card"><div class="proj-title">🎯 PROIEZIONE OBIETTIVO</div>
        <div class="proj-row"><span>Peso attuale</span><span class="proj-val">${lastPeso} kg</span></div>

        <div class="proj-row"><span>Da perdere</span><span class="proj-val">${kgDa.toFixed(1)} kg</span></div>
        <div class="proj-row"><span>Al ritmo attuale</span><span class="proj-val">~${kgWeek>0?kgWeek.toFixed(2):0} kg/sett.</span></div>
        <div class="proj-row"><span>Data stimata</span><span class="proj-val">${kgWeek>0?dataTarget.toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'}):'—'}</span></div>
      </div>`;
    }
  }
  html+=`<div class="home-pill"><button onclick="navGoHome()">← HOME</button></div>`;
  document.getElementById('screen').innerHTML=html;
}

/* ════════ PESO OBIETTIVO ════════ */
function renderPesoObiettivo(){
  const lastPeso=S.profile.entries?.slice(-1)[0]?.peso;
  if(!lastPeso)return '';
  const target=S.settings.pesoTarget;
  if(!target)return `<div class="card"><div class="card-hdr">🎯 PESO OBIETTIVO</div><div class="card-body">
    <div style="font-size:12px;color:var(--ink3);font-family:'IBM Plex Mono',monospace;margin-bottom:10px">Imposta il tuo peso obiettivo per vedere i progressi</div>
    <div style="display:flex;gap:8px">
      <input class="form-inp" id="pt-val" type="number" inputmode="decimal" placeholder="es. 70" style="flex:1">
      <span style="font-size:13px;color:var(--ink3);align-self:center">kg</span>
    </div>
    <button class="big-btn success" style="margin:8px 0 0" onclick="snd();setPesoTarget()">SALVA OBIETTIVO</button>
  </div></div>`;
  const pct=Math.min(100,Math.max(0,Math.round((lastPeso-target)/(lastPeso-target)*100)));
  // Calcola progresso reale
  const start=S.profile.entries?.[0]?.peso||lastPeso;
  const totalDa=Math.abs(start-target)||1;
  const fatto=Math.abs(start-lastPeso);
  const progPct=Math.min(100,Math.round(fatto/totalDa*100));
  return `<div class="card"><div class="card-hdr">🎯 PESO OBIETTIVO
    <button onclick="snd();S.settings.pesoTarget=null;saveState();renderProfilo()" style="background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:11px;font-family:'IBM Plex Mono',monospace">modifica</button>
  </div><div class="card-body">
    <div style="display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:12px;margin-bottom:8px">
      <span>Attuale: <b>${lastPeso} kg</b></span><span>Obiettivo: <b>${target} kg</b></span>
    </div>
    <div class="goal-progress"><div class="goal-progress-fill" style="width:${progPct}%"></div></div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink3);margin-top:4px;text-align:center">
      ${progPct}% completato · ${Math.abs(lastPeso-target).toFixed(1)} kg ${lastPeso>target?'da perdere':'guadagnati'}</div>
  </div></div>`;
}
function setPesoTarget(){
  const v=parseFloat(document.getElementById('pt-val').value);
  if(!v||v<30||v>300){alert('Peso non valido');return;}
  S.settings.pesoTarget=v;saveState();renderProfilo();
}

  }
  // Controlla onboarding al primo accesso
  if(checkOnboarding())return;
  showHome();
}
window.addEventListener('popstate',function(e){
  if(!CUR||_navLock)return;
  // navBack già gestisce il render - ignora questo evento se idx non corrisponde
  const st=e.state;
  if(st&&st.nt&&st.idx>0&&_navStack.length>1){
    _navStack.pop();_navIdx=Math.max(0,_navIdx-1);
    const prev=_navStack[_navStack.length-1];
    if(prev)prev(true);
  } else if(!st||!st.nt||st.idx===0){
    // root: vai a home
    if(_navStack.length>0){_navStack=[];showHome(true);}
    try{history.replaceState({nt:true,idx:0},'','');}catch{}
  }
});
function navPush(fn){_navIdx++;_navStack.push(fn);try{history.pushState({nt:true,idx:_navIdx},'','');}catch{}fn(false);}
function navReplace(fn){if(_navStack.length>0)_navStack[_navStack.length-1]=fn;else _navStack.push(fn);fn(false);}
function navBack(){
  if(_navLock)return;_navLock=true;setTimeout(()=>_navLock=false,400);
  if(_navStack.length>1){
    _navStack.pop();_navIdx=Math.max(0,_navIdx-1);
    try{history.back();}catch(e){}
    const prev=_navStack[_navStack.length-1];
    if(prev)prev(true);
  } else {
    _navStack=[];_navIdx=0;
    try{history.replaceState({nt:true,idx:0},'','');}catch(e){}
    showHome(true);
  }
}
function navGoHome(){_navStack=[];_navIdx=0;try{history.replaceState({nt:true,idx:0},'','');}catch(e){}showHome(true);}

/* ════════ GRAFICI (canvas puro, senza librerie) ════════ */
let _chartType='peso';
function showChart(type,el){
  _chartType=type;
  document.querySelectorAll('.chart-tab').forEach(t=>t.classList.remove('on'));
  if(el)el.classList.add('on');
  const cv=document.getElementById('progrChart');if(!cv)return;
  const p=S.profile;const entries=[...p.entries].sort((a,b)=>a.date.localeCompare(b.date));
  let dataPoints=[];
  if(type==='peso')dataPoints=entries.map(e=>({x:e.date,y:parseFloat(e.peso)||null}));
  else if(type==='bmi')dataPoints=p.altezza?entries.map(e=>({x:e.date,y:e.peso?+(parseFloat(e.peso)/(p.altezza/100)**2).toFixed(1):null})):[];
  else if(type==='vita')dataPoints=entries.map(e=>({x:e.date,y:parseFloat(e.vita)||null}));
  else if(type==='grasso')dataPoints=entries.map(e=>({x:e.date,y:parseFloat(e.grasso)||null}));
  dataPoints=dataPoints.filter(d=>d.y!==null&&!isNaN(d.y));
  if(dataPoints.length<2){cv.getContext('2d').clearRect(0,0,cv.width,cv.height);return;}
  const dpr=window.devicePixelRatio||1;
  const W=cv.parentElement.clientWidth-24||300;const H=180;
  cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  const pad={t:16,r:16,b:32,l:44};
  const vals=dataPoints.map(d=>d.y);
  const minV=Math.min(...vals);const maxV=Math.max(...vals);
  const rng=maxV-minV||1;
  const toX=i=>pad.l+(i/(dataPoints.length-1))*(W-pad.l-pad.r);
  const toY=v=>pad.t+(1-(v-minV)/rng)*(H-pad.t-pad.b);
  // sfondo
  ctx.fillStyle='#fffef9';ctx.fillRect(0,0,W,H);
  // griglia
  ctx.strokeStyle='#e8e3d8';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pad.t+i*(H-pad.t-pad.b)/4;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();}
  // labels Y
  ctx.fillStyle='#888';ctx.font='9px IBM Plex Mono,monospace';ctx.textAlign='right';
  for(let i=0;i<=4;i++){const v=maxV-i*(rng/4);const y=pad.t+i*(H-pad.t-pad.b)/4;ctx.fillText(v.toFixed(1),pad.l-4,y+3);}
  // area fill
  ctx.beginPath();ctx.moveTo(toX(0),toY(dataPoints[0].y));
  dataPoints.forEach((d,i)=>{if(i>0)ctx.lineTo(toX(i),toY(d.y));});
  ctx.lineTo(toX(dataPoints.length-1),H-pad.b);ctx.lineTo(toX(0),H-pad.b);ctx.closePath();
  ctx.fillStyle='rgba(22,163,74,.1)';ctx.fill();
  // linea
  ctx.beginPath();ctx.moveTo(toX(0),toY(dataPoints[0].y));
  dataPoints.forEach((d,i)=>{if(i>0)ctx.lineTo(toX(i),toY(d.y));});
  ctx.strokeStyle='#16a34a';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.stroke();
  // punti
  dataPoints.forEach((d,i)=>{
    ctx.beginPath();ctx.arc(toX(i),toY(d.y),4,0,Math.PI*2);
    ctx.fillStyle='#16a34a';ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(toX(i),toY(d.y),2,0,Math.PI*2);ctx.fill();
  });
  // labels X (prime e ultime)
  ctx.fillStyle='#888';ctx.font='9px IBM Plex Mono,monospace';ctx.textAlign='center';
  const showIdx=[0,dataPoints.length-1];
  if(dataPoints.length>4)showIdx.push(Math.floor(dataPoints.length/2));
  showIdx.forEach(i=>{
    const d=dataPoints[i];const lbl=d.x.slice(5);// MM-DD
    ctx.fillText(lbl,toX(i),H-pad.b+12);
  });
}

function saveEntry(){
  const peso=parseFloat(document.getElementById('ep').value);
  if(!peso){alert('Inserisci il peso!');return;}
  const entry={date:TODAY,peso,vita:document.getElementById('ev').value,fianchi:document.getElementById('ef').value,grasso:document.getElementById('eg').value,note:document.getElementById('en').value};
  S.profile.entries=S.profile.entries.filter(e=>e.date!==TODAY);
  S.profile.entries.push(entry);
  S.profile.entries.sort((a,b)=>a.date.localeCompare(b.date));
  saveState();renderProfilo();
}
function delEntry(i){if(confirm('Elimina questa misurazione?')){S.profile.entries.splice(i,1);saveState();renderProfilo();}}

function runTDEE(){
  const w=parseFloat(document.getElementById('tw').value),h=parseFloat(document.getElementById('th').value),a=parseFloat(document.getElementById('ta').value);
  const s=document.getElementById('ts').value,act=document.getElementById('tact').value;
  if(!w||!h||!a){alert('Compila tutti i campi');return;}
  const bmr=s==='m'?10*w+6.25*h-5*a+5:10*w+6.25*h-5*a-161;
  const f={sedentario:1.2,leggera:1.375,moderata:1.55,intensa:1.725,estrema:1.9};
  const tdee=Math.round(bmr*(f[act]||1.55));
  const res=document.getElementById('tres');res.style.display='block';
  res.innerHTML=`BMR: ${Math.round(bmr)} kcal/gg<br>TDEE: <b>${tdee}</b> kcal/gg<br>Dimagrimento: ${tdee-500}<br>Mantenimento: ${tdee}<br>Massa +300: ${tdee+300}<br><button class="big-btn success" onclick="snd('confirm');applyTDEE(${tdee})" style="margin:10px 0 0">APPLICA TDEE</button>`;
}
function resetDay(){if(confirm('Azzera il diario di oggi?')){S.meals={colazione:[],pranzo:[],cena:[],merenda:[]};saveState();navGoHome();}}
function exportData(){
  try{
    const blob=new Blob([JSON.stringify({nutritrack:true,version:10,slug:CUR.slug,data:S,exported:new Date().toISOString()})],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`nutritrack_backup_${TODAY}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
  }catch(e){alert('Errore esportazione: '+e.message);}
}
function importData(){document.getElementById('importFile').click();}
function doImport(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.nutritrack){alert('File non valido');return;}
      if(!confirm('Importa il backup? Sovrascriverà i dati attuali.'))return;
      if(d.data.meals)S.meals=d.data.meals;if(d.data.profile)S.profile=d.data.profile;if(d.data.settings)S.settings=d.data.settings;if(d.data.workouts)S.workouts=d.data.workouts;if(d.data.calPlans)S.calPlans=d.data.calPlans;if(typeof d.data.water==='number')S.water=d.data.water;
      saveState();alert('✅ Backup importato!');navGoHome();
    }catch(err){alert('Errore importazione: '+err.message);}
  };
  reader.readAsText(file);input.value='';
}

/* ══ PWA MANIFEST (senza Service Worker per compatibilità GitHub Pages) ══ */
(function setupPWA(){
  try{
    function mkIcon(sz){
      const cv=document.createElement('canvas');cv.width=sz;cv.height=sz;
      const ctx=cv.getContext('2d'),r=sz*.22;
      ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(sz-r,0);
      ctx.arcTo(sz,0,sz,r,r);ctx.lineTo(sz,sz-r);ctx.arcTo(sz,sz,sz-r,sz,r);
      ctx.lineTo(r,sz);ctx.arcTo(0,sz,0,sz-r,r);ctx.lineTo(0,r);ctx.arcTo(0,0,r,0,r);
      ctx.closePath();ctx.fill();
      ctx.fillStyle='#16a34a';ctx.beginPath();ctx.arc(sz/2,sz/2,sz*.34,0,Math.PI*2);ctx.fill();
      ctx.font='bold '+Math.round(sz*.36)+'px serif';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🥗',sz/2,sz*.52);
      return cv.toDataURL('image/png');
    }
    const ic192=mkIcon(192),ic512=mkIcon(512);
    const at=document.getElementById('apple-touch-icon');
    if(at)at.href=ic192;
    const startUrl=location.href.split('?')[0].split('#')[0];
    const mf={
      name:'NutriTrack Pro',short_name:'NutriTrack',
      description:'Diario nutrizionale – Dott. Petrolese Giovanni',
      start_url:startUrl,display:'standalone',
      background_color:'#f5f0e8',theme_color:'#1a1a2e',
      orientation:'portrait-primary',
      icons:[
        {src:ic192,sizes:'192x192',type:'image/png',purpose:'any maskable'},
        {src:ic512,sizes:'512x512',type:'image/png',purpose:'any maskable'}
      ]
    };
    const mel=document.getElementById('pwa-manifest');
    if(mel){
      const blob=new Blob([JSON.stringify(mf)],{type:'application/manifest+json'});
      mel.href=URL.createObjectURL(blob);
    }
    // Deregistra eventuali service worker precedenti che causano schermo bianco
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations().then(function(regs){
        regs.forEach(function(r){r.unregister();});
      }).catch(function(){});
    }
  }catch(e){console.warn('[NT] PWA setup error:',e);}
})();
